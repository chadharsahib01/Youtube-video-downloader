name: Manual Android Build
on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code with Submodules
        uses: actions/checkout@v6
        with:
          # CRITICAL: This downloads the missing :common, :library, and :ffmpeg folders
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Generate dummy local.properties
        # This prevents the "local.properties could not be found" error
        run: touch local.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        # We use --no-daemon to save memory on the GitHub runner
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ytdlnis-debug-apk
          path: app/build/outputs/apk/debug/*.apk
