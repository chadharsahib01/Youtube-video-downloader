name: Manual APK Build
on:
  workflow_dispatch:

# Setting this at the top level opts into Node 24 immediately 
# and silences the deprecation warnings.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Updated to v6 for Node 24 support
      - name: Checkout code
        uses: actions/checkout@v6

      # Updated to v5 for Node 24 support
      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle' # Adding cache here speeds up future builds

      # subosito/flutter-action v2.22+ handles Node 24 internally
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --debug

      # Updated to v7 for the latest artifact performance
      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ytdlnis-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
